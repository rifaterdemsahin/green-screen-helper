<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg-grad)" />
  <!-- Green Screen backdrop -->
  <rect x="15" y="15" width="70" height="45" rx="8" fill="url(#green-grad)" filter="url(#glow)" opacity="0.85" />
  <rect x="15" y="15" width="70" height="45" rx="8" fill="none" stroke="#4ade80" stroke-width="2" />
  <!-- Camera icon -->
  <g transform="translate(10, 5)">
    <!-- Tripod -->
    <path d="M 40 75 L 25 90 M 40 75 L 55 90 M 40 70 L 40 78" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
    <!-- Camera Body -->
    <rect x="22" y="50" width="36" height="22" rx="4" fill="url(#accent-grad)" stroke="#cbd5e1" stroke-width="1.5" />
    <!-- Camera Lens -->
    <rect x="58" y="55" width="8" height="12" rx="2" fill="#cbd5e1" />
    <!-- Camera Flash/Dial -->
    <rect x="28" y="46" width="10" height="4" fill="#ef4444" rx="1" />
    <!-- Lens Reflection -->
    <circle cx="62" cy="61" r="2" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
