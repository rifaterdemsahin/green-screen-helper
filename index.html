<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Screen Helper | Perfect Chroma Keying</title>
    <meta name="description" content="An interactive tool to help you set up the perfect green screen or blue screen by visualizing your chroma key in real-time. Adjust tolerance, pick colors, and get guides for camera and lighting setup.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22green%22/></svg>">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">
    <div class="container-fluid">
        <h1 class="text-center my-4">✨ Green Screen Helper ✨</h1>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="video-container position-relative p-0">
                    <video id="video" class="w-100" autoplay playsinline></video>
                    <canvas id="canvas" class="position-absolute top-0 start-0 w-100"></canvas>
                </div>
            </div>
        </div>

        <div class="row justify-content-center my-4 g-3">
            <div class="col-md-4">
                <div class="control-group p-3 rounded bg-secondary h-100">
                    <h3 class="text-center">Camera</h3>
                    <div class="d-grid gap-2">
                        <button id="start-button" class="btn btn-primary">📹 Start Camera</button>
                        <button id="stop-button" class="btn btn-danger">🛑 Stop Camera</button>
                        <button id="fullscreen-button" class="btn btn-secondary">↔️ Full Screen</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="control-group p-3 rounded bg-secondary h-100">
                    <h3 class="text-center">Chroma Key</h3>
                    <div class="d-grid gap-2">
                        <button id="toggle-chroma-button" class="btn btn-success">✨ Chroma: On</button>
                        <button id="golden-ratio-button" class="btn btn-warning">🌀 Golden Ratio</button>
                        <button id="pick-color-button" class="btn btn-outline-light">🎨 Pick Color</button>
                        <button id="set-green-button" class="btn btn-success">🟢 Set Green</button>
                        <button id="set-blue-button" class="btn btn-info">🔵 Set Blue</button>
                    </div>
                    <div class="tolerance-container mt-3">
                        <label for="tolerance" class="form-label">Tolerance: <span id="tolerance-value">50</span></label>
                        <input type="range" id="tolerance" class="form-range" min="0" max="200" value="50">
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="control-group p-3 rounded bg-secondary h-100">
                    <h3 class="text-center">Guides & Tools</h3>
                    <div class="d-grid gap-2">
                        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#shooting-guide-modal">🎬 Shooting Guide</button>
                        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#camera-guide-modal">📷 Camera Guide</button>
                        <a href="calculator.html" class="btn btn-secondary">🧮 Room Calculator</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Shooting Guide Modal -->
    <div class="modal fade" id="shooting-guide-modal" tabindex="-1" aria-labelledby="shootingGuideLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-secondary text-white">
                <div class="modal-header">
                    <h5 class="modal-title" id="shootingGuideLabel">🎬 Green Screen Shooting Guide</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content from shooting-guide.html -->
                </div>
            </div>
        </div>
    </div>

    <!-- Camera Guide Modal -->
    <div class="modal fade" id="camera-guide-modal" tabindex="-1" aria-labelledby="cameraGuideLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-secondary text-white">
                <div class="modal-header">
                    <h5 class="modal-title" id="cameraGuideLabel">📷 Camera & Lens Guide</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content from camera-guide.html -->
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-black">
        <div class="container text-center">
            <div class="support-buttons my-3">
                <a href="https://github.com/rifaterdemsahin/coverletter" target="_blank" class="btn btn-outline-light">Build Your Own N8N</a>
                <a href="https://buymeacoffee.com/rifaterdemsahin" target="_blank" class="btn btn-warning">Buy Me a Coffee</a>
            </div>
            <div class="social-links my-3">
                <a href="https://www.youtube.com/@RifatErdemSahin" target="_blank" class="social-link text-white mx-2">YouTube</a>
                <a href="https://www.linkedin.com/in/rifaterdemsahin/" target="_blank" class="social-link text-white mx-2">LinkedIn</a>
                <a href="https://github.com/rifaterdemsahin/" target="_blank" class="social-link text-white mx-2">GitHub</a>
                <a href="https://hello.rifaterdemsahin.com" target="_blank" class="social-link text-white mx-2">Website</a>
            </div>
            <p class="text-muted">Built with ❤️ by Rifat Erdem Sahin | AI-powered green screen assistance</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
